<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coding Arena</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.0/min/vs/loader.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-100 flex flex-col h-screen">
    <div class="flex flex-row flex-grow">
        <!-- Code Editor Section -->
        <div class="w-1/2 p-4">
            <h2 class="text-2xl font-bold mb-4">Code Editor</h2>
            <div class="mb-4 flex items-center space-x-4">
                <div>
                    <label for="languageSelect" class="mr-2">Select Language:</label>
                    <select id="languageSelect" class="border p-2 rounded">
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="java">Java</option>
                        <option value="html">HTML</option>
                        <option value="css">CSS</option>
                    </select>
                </div>
                <div>
                    <label for="categorySelect" class="mr-2">Select Category:</label>
                    <select id="categorySelect" class="border p-2 rounded">
                        <option value="all">All</option>
                        <option value="Basics">Basics</option>
                        <option value="Algorithms">Algorithms</option>
                        <option value="Web Development">Web Development</option>
                    </select>
                </div>
                <div>
                    <span class="font-bold">Score: <span id="totalScore">0</span></span>
                </div>
            </div>
            <div id="editor" class="w-full h-[75vh] border border-gray-300"></div>
            <div class="mt-4 flex space-x-2">
                <button id="validateCode" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Validate Code</button>
                <button id="submitCode" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">Submit Code</button>
            </div>
            <div id="validationFeedback" class="mt-2 text-sm text-red-500 hidden"></div>
        </div>
        <!-- Challenge Section -->
        <div class="w-1/2 p-4 bg-white shadow-md">
            <h2 class="text-2xl font-bold mb-4">Challenge</h2>
            <div id="challengeInfo" class="mb-4">
                <h3 id="challengeTitle" class="text-xl font-semibold"></h3>
                <p id="challengeDifficulty" class="text-sm text-gray-600"></p>
                <p id="challengeDescription" class="mt-2"></p>
                <p id="timeRemaining" class="mt-2 font-bold text-red-500"></p>
                <div class="mt-2">
                    <span class="font-bold">Progress:</span>
                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                        <div id="progressBar" class="bg-green-500 h-2.5 rounded-full" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div id="testResults" class="mt-4"></div>
            <div class="mt-4 flex space-x-2">
                <button id="backChallenge" class="bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">Back</button>
                <button id="nextChallenge" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">Next Challenge</button>
                <button id="getHint" class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">Get Hint</button>
                <button id="viewSolution" class="bg-yellow-500 text-white px-4 py-2 rounded hover:bg-yellow-600 hidden">View Solution</button>
            </div>
            <div id="hintSection" class="mt-4 hidden">
                <h4 class="text-lg font-semibold">Hint (Step <span id="hintStep">1</span>/3)</h4>
                <p id="hintText"></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
